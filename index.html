<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Automation Initiatives — Loan Mountain Capital</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1C2B3A;
    --blue-accent: #3B82F6;
    --bg: #EEF2F7;
    --card-bg: #FFFFFF;
    --border: #D1DCE8;
    --text-primary: #1C2B3A;
    --text-secondary: #5A7291;
    --text-muted: #8FA3BB;
    --pipeline-border: #F5B942; --pipeline-badge: #633806; --pipeline-badge-bg: #FAEEDA; --pipeline-header: #92600A;
    --inprogress-border: #3B82F6; --inprogress-badge: #0C447C; --inprogress-badge-bg: #E6F1FB; --inprogress-header: #1D4ED8;
    --blocked-border: #EF4444; --blocked-badge: #791F1F; --blocked-badge-bg: #FCEBEB; --blocked-header: #B91C1C;
    --complete-border: #22C55E; --complete-badge: #085041; --complete-badge-bg: #E1F5EE; --complete-header: #15803D;
  }

  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }

  .header {
    background: var(--navy); padding: 18px 24px 14px;
    display: flex; align-items: flex-end; justify-content: space-between;
    border-bottom: 2px solid var(--blue-accent);
  }
  .header-left h1 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: #fff; letter-spacing: 0.04em; text-transform: uppercase; }
  .header-left p { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 10px; }

  .sync-indicator { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; opacity: 0; transition: opacity 0.3s; }
  .sync-indicator.visible { opacity: 1; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #22C55E; }
  .sync-dot.syncing { background: #F59E0B; animation: pulse 0.8s infinite; }
  .sync-dot.error { background: #EF4444; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .add-btn { background: var(--blue-accent); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .add-btn:hover { background: #2563EB; }

  .stats-bar { background: #fff; border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; gap: 24px; align-items: center; }
  .stat-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); font-family: 'DM Mono', monospace; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
  .stat-item strong { color: var(--text-primary); font-size: 14px; }

  .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 20px 24px; min-height: calc(100vh - 120px); }
  .column { display: flex; flex-direction: column; }

  .col-header { padding: 12px 14px 10px; border-radius: 8px 8px 0 0; display: flex; align-items: center; border-left: 3px solid; background: var(--card-bg); border-top: 1px solid var(--border); border-right: 1px solid var(--border); }
  .col-header-left { display: flex; align-items: center; gap: 8px; }
  .col-title { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
  .col-count { font-family: 'DM Mono', monospace; font-size: 11px; padding: 2px 7px; border-radius: 99px; font-weight: 500; }

  .col-pipeline .col-header { border-left-color: var(--pipeline-border); } .col-pipeline .col-title { color: var(--pipeline-header); } .col-pipeline .col-count { background: var(--pipeline-badge-bg); color: var(--pipeline-badge); }
  .col-inprogress .col-header { border-left-color: var(--inprogress-border); } .col-inprogress .col-title { color: var(--inprogress-header); } .col-inprogress .col-count { background: var(--inprogress-badge-bg); color: var(--inprogress-badge); }
  .col-blocked .col-header { border-left-color: var(--blocked-border); } .col-blocked .col-title { color: var(--blocked-header); } .col-blocked .col-count { background: var(--blocked-badge-bg); color: var(--blocked-badge); }
  .col-complete .col-header { border-left-color: var(--complete-border); } .col-complete .col-title { color: var(--complete-header); } .col-complete .col-count { background: var(--complete-badge-bg); color: var(--complete-badge); }

  .col-body { flex: 1; padding: 8px; background: #F3F7FC; border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; min-height: 200px; transition: background 0.15s; }
  .col-body.drag-over { background: #E2ECF8; }

  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin-bottom: 8px; cursor: grab; transition: box-shadow 0.15s, transform 0.1s; position: relative; }
  .card:hover { box-shadow: 0 4px 12px rgba(28,43,58,0.1); transform: translateY(-1px); }
  .card.dragging { opacity: 0.45; cursor: grabbing; }

  .card-delete { position: absolute; top: 7px; right: 7px; background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 12px; border-radius: 3px; padding: 2px 4px; opacity: 0; transition: opacity 0.15s, color 0.1s; }
  .card:hover .card-delete { opacity: 1; }
  .card-delete:hover { color: #EF4444; }

  .card-field { outline: none; border-radius: 4px; transition: background 0.15s; cursor: text; }
  .card-field:hover { background: #F0F4F8; }
  .card-field:focus { background: #EEF2F7; box-shadow: 0 0 0 2px var(--blue-accent); }

  .card-name { font-size: 13px; font-weight: 500; color: var(--text-primary); line-height: 1.4; padding: 2px 22px 2px 4px; margin-bottom: 7px; display: block; word-break: break-word; }
  .card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }

  .priority-select { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 99px; text-transform: uppercase; letter-spacing: 0.05em; border: none; cursor: pointer; outline: none; appearance: none; -webkit-appearance: none; }
  .priority-select:focus { box-shadow: 0 0 0 2px var(--blue-accent); }
  .priority-High { background: var(--blocked-badge-bg); color: var(--blocked-badge); }
  .priority-Medium { background: var(--pipeline-badge-bg); color: var(--pipeline-badge); }
  .priority-Low { background: var(--complete-badge-bg); color: var(--complete-badge); }

  .card-requestor { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); padding: 2px 4px; min-width: 40px; }
  .card-requestor:empty:before { content: attr(data-placeholder); color: var(--text-muted); opacity: 0.5; }

  .card-notes { font-size: 11px; color: var(--text-secondary); line-height: 1.45; border-top: 1px solid var(--bg); padding: 5px 4px 2px; min-height: 1.4em; display: block; word-break: break-word; }
  .card-notes:empty:before { content: attr(data-placeholder); color: var(--text-muted); opacity: 0.5; }

  .empty-col { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); text-align: center; padding: 20px 0; }

  .loading-overlay { position: fixed; inset: 0; background: rgba(238,242,247,0.85); display: flex; align-items: center; justify-content: center; z-index: 200; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text-secondary); flex-direction: column; gap: 12px; }
  .loading-overlay.hidden { display: none; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--blue-accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <span>Loading...</span>
</div>

<div class="header">
  <div class="header-left">
    <h1>Automation Initiatives</h1>
    <p>Loan Mountain Capital · Updated by Sergio Vega</p>
  </div>
  <div class="header-right">
    <div class="sync-indicator" id="sync-indicator">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-label">Saved</span>
    </div>
    <button class="add-btn" onclick="addCard()">+ Add Initiative</button>
  </div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="board">
  <div class="column col-pipeline">
    <div class="col-header"><div class="col-header-left"><span class="col-title">Pipeline</span><span class="col-count" id="count-Pipeline">0</span></div></div>
    <div class="col-body" id="body-Pipeline" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'Pipeline')"></div>
  </div>
  <div class="column col-inprogress">
    <div class="col-header"><div class="col-header-left"><span class="col-title">In Progress</span><span class="col-count" id="count-In Progress">0</span></div></div>
    <div class="col-body" id="body-In Progress" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'In Progress')"></div>
  </div>
  <div class="column col-blocked">
    <div class="col-header"><div class="col-header-left"><span class="col-title">Blocked</span><span class="col-count" id="count-Blocked">0</span></div></div>
    <div class="col-body" id="body-Blocked" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'Blocked')"></div>
  </div>
  <div class="column col-complete">
    <div class="col-header"><div class="col-header-left"><span class="col-title">Complete</span><span class="col-count" id="count-Complete">0</span></div></div>
    <div class="col-body" id="body-Complete" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'Complete')"></div>
  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz5VHNeM0fNWaSzYpLh9VUHBG6K4Nw4t59IDFJ_Jyb4-VK9-e864i8oLar5kOPToUI/exec';
  const STATUSES = ['Pipeline','In Progress','Blocked','Complete'];
  const DOT_COLORS = {'Pipeline':'#F5B942','In Progress':'#3B82F6','Blocked':'#EF4444','Complete':'#22C55E'};
  let initiatives = [];
  let dragId = null;

  function showSync(state, label) {
    const ind = document.getElementById('sync-indicator');
    const dot = document.getElementById('sync-dot');
    ind.classList.add('visible');
    dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
    document.getElementById('sync-label').textContent = label;
    if (state === 'saved') setTimeout(() => ind.classList.remove('visible'), 2500);
  }

  async function loadFromSheet() {
    document.getElementById('loading-overlay').classList.remove('hidden');
    try {
      const res = await fetch(SCRIPT_URL + '?action=get', { redirect: 'follow' });
      initiatives = await res.json();
    } catch(e) {
      showSync('error', 'Load failed');
      initiatives = [];
    }
    document.getElementById('loading-overlay').classList.add('hidden');
    render();
  }

  async function pushToSheet(action, payload) {
    showSync('syncing', 'Saving...');
    try {
      let url = SCRIPT_URL + '?action=' + action;
      if (payload.item) url += '&item=' + encodeURIComponent(JSON.stringify(payload.item));
      if (payload.id)   url += '&id='   + encodeURIComponent(String(payload.id));
      await fetch(url, { redirect: 'follow' });
      showSync('saved', 'Saved');
    } catch(e) { showSync('error', 'Save failed'); }
  }

  function render() {
    STATUSES.forEach(s => {
      const body = document.getElementById('body-' + s);
      const items = initiatives.filter(i => i.status === s);
      document.getElementById('count-' + s).textContent = items.length;
      body.innerHTML = items.length === 0
        ? `<div class="empty-col">No items</div>`
        : items.map(cardHTML).join('');
    });
    document.getElementById('stats-bar').innerHTML = STATUSES.map(s =>
      `<div class="stat-item"><span class="stat-dot" style="background:${DOT_COLORS[s]}"></span><strong>${initiatives.filter(i=>i.status===s).length}</strong> ${s}</div>`
    ).join('<span style="color:var(--border);font-size:18px">·</span>');
  }

  function esc(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function cardHTML(item) {
    const id = String(item.id);
    return `
      <div class="card" draggable="true" id="card-${id}" ondragstart="onDragStart(event,'${id}')" ondragend="onDragEnd()">
        <button class="card-delete" onclick="deleteCard('${id}')" title="Delete">✕</button>
        <div class="card-name card-field" contenteditable="true"
          onblur="saveField('${id}','name',this)"
          onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
        >${esc(item.name)}</div>
        <div class="card-meta">
          <select class="priority-select priority-${esc(item.priority)}"
            onchange="savePriority('${id}',this)" onclick="event.stopPropagation()">
            <option ${item.priority==='High'?'selected':''}>High</option>
            <option ${item.priority==='Medium'?'selected':''}>Medium</option>
            <option ${item.priority==='Low'?'selected':''}>Low</option>
          </select>
          <div class="card-requestor card-field" contenteditable="true" data-placeholder="Requestor"
            onblur="saveField('${id}','requestor',this)"
            onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
          >${esc(item.requestor)}</div>
        </div>
        <div class="card-notes card-field" contenteditable="true" data-placeholder="Add notes..."
          onblur="saveField('${id}','notes',this)"
        >${esc(item.notes)}</div>
      </div>`;
  }

  function saveField(id, field, el) {
    const item = initiatives.find(i => String(i.id) === String(id));
    if (!item) return;
    const val = el.innerText.trim();
    if (item[field] === val) return;
    item[field] = val;
    pushToSheet('update', { item });
  }

  function savePriority(id, select) {
    const item = initiatives.find(i => String(i.id) === String(id));
    if (!item) return;
    item.priority = select.value;
    select.className = 'priority-select priority-' + select.value;
    pushToSheet('update', { item });
  }

  function addCard() {
    const today = new Date().toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'numeric'});
    const item = { id: Date.now().toString(), name: '', priority: 'Medium', status: 'Pipeline', requestor: '', notes: '', date: today };
    initiatives.unshift(item);
    render();
    pushToSheet('add', { item });
    setTimeout(() => {
      const el = document.querySelector(`#card-${item.id} .card-name`);
      if (el) el.focus();
    }, 50);
  }

  function deleteCard(id) {
    initiatives = initiatives.filter(i => String(i.id) !== String(id));
    render();
    pushToSheet('delete', { id });
  }

  function onDragStart(e, id) {
    if (document.activeElement && document.activeElement.isContentEditable) { e.preventDefault(); return; }
    dragId = id;
    setTimeout(() => document.getElementById('card-' + id)?.classList.add('dragging'), 0);
  }
  function onDragEnd() { document.querySelectorAll('.card').forEach(c => c.classList.remove('dragging')); }
  function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
  function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
  function onDrop(e, status) {
    e.preventDefault(); e.currentTarget.classList.remove('drag-over');
    if (!dragId) return;
    const item = initiatives.find(i => String(i.id) === String(dragId));
    if (item && item.status !== status) { item.status = status; render(); pushToSheet('update', { item }); }
    dragId = null;
  }

  loadFromSheet();
</script>
</body>
</html>
